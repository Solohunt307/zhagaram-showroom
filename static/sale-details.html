<!DOCTYPE html>
<html>
<head>
  <title>Sale Details</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header>
  <div class="brand" onclick="location.href='sales.html'">
    Zhagaram Showroom Management
  </div>
</header>

<div class="dashboard-container">

<h2>Sale Details</h2>

<!-- ================= SUMMARY ================= -->

<div class="kpi-card" id="saleSummary"></div>

<hr>

<!-- ================= ADD PAYMENT ================= -->

<h3>Add Payment</h3>

<form id="paymentForm" class="kpi-card">

  <input type="number" step="0.01" id="payAmount" placeholder="Amount" required>

  <select id="payType">
    <option>UPI</option>
    <option>CARD</option>
    <option>CASH</option>
    <option>BANK</option>
  </select>

  <input id="receivedBy" placeholder="Received by" required>

  <button type="submit">Add Payment</button>

</form>

<hr>

<!-- ================= HISTORY ================= -->

<h3>Payment History</h3>

<table border="1" width="100%">
<thead>
<tr>
<th>Date</th>
<th>Mode</th>
<th>Amount</th>
<th>Received By</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>
</table>

</div>

<script src="js/dashboard.js"></script>
<script src="js/sale-details.js"></script>

</body>
</html>
